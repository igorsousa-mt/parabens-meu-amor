<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Meu Amor ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:linear-gradient(180deg,#fff7f8,#ffe4ec);
    font-family:Arial,sans-serif;
    overflow:hidden;
    height:100vh;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

.container{
    position:relative;
    z-index:10;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:25px;
}

#tela2{
    display:none;
}

h1{
    color:#d6336c;
    margin-bottom:20px;
    font-size:2rem;
}

img{
    width:min(300px,80vw);
    height:min(300px,80vw);
    object-fit:cover;
    border:6px solid white;
    box-shadow:0 0 25px rgba(0,0,0,.15);
    animation:pulse 3s infinite;
}

#foto1{
    border-radius:50%;
}

#foto2{
    border-radius:20px;
}

.mensagem{
    margin-top:25px;
    max-width:600px;
    color:#444;
    line-height:1.8;
}

.assinatura,.ass{
    margin-top:20px;
    color:#d6336c;
    font-weight:bold;
}

.ass{
    opacity:0;
    transition:1.5s;
}

.botao{
    margin-top:20px;
    padding:14px 28px;
    border:none;
    border-radius:30px;
    background:#d6336c;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#texto{
    color:#444;
    line-height:1.8;
    font-size:1.05rem;
    max-width:700px;
    min-height:250px;
}

.cursor{
    border-right:3px solid #d6336c;
    animation:piscando .7s infinite;
}

@keyframes piscando{
    50%{border-color:transparent;}
}

@keyframes pulse{
    50%{transform:scale(1.05);}
}

@keyframes fade{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="tela1" class="container">

<h1>Parabéns, Meu Amor ❤️</h1>

<img id="foto1" src="foto.jpg" alt="">

<div class="mensagem">
Hoje é um dia muito especial pra mim, então me dediquei ao máximo para fazer isso, espero que goste meu amor.
</div>

<div class="assinatura">
Com amor,<br>
Igor ❤️
</div>

<button class="botao" id="btnSurpresa">
❤️ Clique Aqui ❤️
</button>

</div>

<div id="tela2" class="container">

<img id="foto2" src="foto2.jpg" alt="">

<h1>❤️ Meu Amor ❤️</h1>

<div id="texto" class="cursor"></div>

<div class="ass" id="assinatura2">
Com todo meu amor,<br>
Igor ❤️
</div>

</div>

<audio id="musica" loop preload="auto">
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const musica=document.getElementById("musica");

document.getElementById("btnSurpresa").addEventListener("click",()=>{

    musica.play().catch(()=>{});

    document.getElementById("tela1").style.display="none";
    document.getElementById("tela2").style.display="flex";
    document.getElementById("tela2").style.animation="fade 1s ease";

    iniciarMensagem();
});

function iniciarMensagem(){

const mensagem=`

Hoje é o seu aniversário, mas quem ganhou o presente fui eu quando você entrou na minha vida.

Obrigado por cada momento, por cada conversa, por cada sorriso e por toda a felicidade que você me proporciona.

Você é uma pessoa incrível e merece tudo de melhor que existe neste mundo.

Sou grato por ter você na minha vida e por todos os momentos que compartilhamos juntos.

Que você realize seus sonhos e mantenha sempre seu coração cheio de alegria (e de mim, rio grande do sul rio grande do sul).

Que seu novo ciclo seja cheio de amor, paz, saúde e felicidade.

Obrigado por ser essa pessoa tão especial.

Eu te amo, mais do que tudo nessa vida, e que seja pra sempre a NOSSA vida. ❤️
`;

let i=0;
const texto=document.getElementById("texto");

function escrever(){
    if(i<mensagem.length){
        texto.innerHTML+=mensagem.charAt(i);
        i++;
        setTimeout(escrever,30);
    }else{
        texto.classList.remove("cursor");
        document.getElementById("assinatura2").style.opacity=1;
    }
}

escrever();
}

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();

let hearts=[];

function criarCoracao(){
    hearts.push({
        x:Math.random()*canvas.width,
        y:canvas.height+20,
        size:Math.random()*20+10,
        speed:Math.random()*2+1,
        alpha:1
    });
}

setInterval(criarCoracao,150);

function desenharCoracao(x,y,s){
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(s/20,s/20);

    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(0,-10,20,-10,20,10);
    ctx.bezierCurveTo(20,25,0,35,0,45);
    ctx.bezierCurveTo(0,35,-20,25,-20,10);
    ctx.bezierCurveTo(-20,-10,0,-10,0,0);

    ctx.fillStyle="#ff5d8f";
    ctx.fill();
    ctx.restore();
}

function animar(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    hearts.forEach((h,i)=>{
        h.y-=h.speed;
        h.alpha-=0.002;

        ctx.globalAlpha=h.alpha;
        desenharCoracao(h.x,h.y,h.size);

        if(h.alpha<=0){
            hearts.splice(i,1);
        }
    });

    ctx.globalAlpha=1;
    requestAnimationFrame(animar);
}

animar();
window.addEventListener("resize",resize);
</script>

</body>
</html>
