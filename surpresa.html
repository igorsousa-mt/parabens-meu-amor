<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Você ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(180deg,#fff7f8,#ffe4ec);
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

.container{
    position:relative;
    z-index:10;
    text-align:center;
    padding:25px;
    max-width:650px;
}

img{
    width:280px;
    height:280px;
    object-fit:cover;
    border-radius:20px;
    border:5px solid white;
    box-shadow:0 0 25px rgba(0,0,0,.15);
    margin-bottom:25px;
    animation:pulse 3s infinite;
}

h1{
    color:#d6336c;
    margin-bottom:20px;
}

#texto{
    color:#444;
    line-height:1.8;
    font-size:1.1rem;
    min-height:280px;
    text-align:center;
}

.ass{
    margin-top:20px;
    font-weight:bold;
    color:#d6336c;
    opacity:0;
    transition:1.5s;
}

.cursor{
    border-right:3px solid #d6336c;
    animation:piscando .7s infinite;
}

@keyframes piscando{
    50%{
        border-color:transparent;
    }
}

@keyframes pulse{
    50%{
        transform:scale(1.04);
    }
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container">

<img src="foto2.jpg">

<h1>❤️ Meu Amor ❤️</h1>

<div id="texto" class="cursor"></div>

<div class="ass" id="assinatura">
Com todo meu amor,<br>
Igor ❤️
</div>

</div>

<script>

/* ==========================
   TEXTO MÁQUINA DE ESCREVER
========================== */

const mensagem = `

Hoje é o seu aniversário, mas quem ganhou o presente fui eu quando você entrou na minha vida.

Obrigado por cada momento, por cada conversa, por cada sorriso e por toda a felicidade que você me proporciona.

Você é uma pessoa incrível e merece tudo de melhor que existe neste mundo.

Sou grato por ter você na minha vida e por todos os momentos que compartilhamos juntos.

Que você realize seus sonhos e mantenha sempre seu coração cheio de alegria (e de mim, rio grande do sul rio grande do sul).

Que seu novo ciclo seja cheio de amor, paz, saúde e felicidade.

Obrigado por ser essa pessoa tão especial.

Eu te amo, mais do que tudo nessa vida, e que seja pra sempre a NOSSA vida. ❤️

`;

let i = 0;
const texto = document.getElementById("texto");

function escrever(){

    if(i < mensagem.length){

        texto.innerHTML += mensagem.charAt(i);

        i++;

        setTimeout(escrever,40);

    }else{

        texto.classList.remove("cursor");

        document.getElementById("assinatura").style.opacity = 1;

    }

}

escrever();

/* ==========================
   CORAÇÕES ANIMADOS
========================== */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];

function criarCoracao(){

    hearts.push({
        x:Math.random()*canvas.width,
        y:canvas.height+20,
        size:Math.random()*20+10,
        speed:Math.random()*2+1,
        alpha:1
    });

}

setInterval(criarCoracao,300);

function desenharCoracao(x,y,s){

    ctx.save();

    ctx.translate(x,y);

    ctx.scale(s/20,s/20);

    ctx.beginPath();

    ctx.moveTo(0,0);

    ctx.bezierCurveTo(0,-10,20,-10,20,10);
    ctx.bezierCurveTo(20,25,0,35,0,45);

    ctx.bezierCurveTo(0,35,-20,25,-20,10);
    ctx.bezierCurveTo(-20,-10,0,-10,0,0);

    ctx.fillStyle="#ff5d8f";
    ctx.fill();

    ctx.restore();
}

function animar(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    hearts.forEach((h,index)=>{

        h.y -= h.speed;
        h.alpha -= 0.002;

        ctx.globalAlpha = h.alpha;

        desenharCoracao(h.x,h.y,h.size);

        if(h.alpha <= 0){
            hearts.splice(index,1);
        }

    });

    ctx.globalAlpha = 1;

    requestAnimationFrame(animar);

}

animar();

window.addEventListener("resize",()=>{

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

});

</script>

</body>
</html>
